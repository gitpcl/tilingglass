name: TilingGlass

options:
  bundleIdPrefix: com.pedrolopes
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

# Project-wide settings. Signing lives here (not just on the app target) so that
# Swift Package targets built as dependencies — e.g. KeyboardShortcuts' resource
# bundle — inherit a development team and identity instead of failing to sign.
settings:
  base:
    DEVELOPMENT_TEAM: YOUR_TEAM_ID
    CODE_SIGN_STYLE: Manual
    # Local dev signing pinned by SHA-1: the generic "Apple Development" name is
    # ambiguous on this machine (two matching certs) and Xcode falls back to a
    # non-existent "Mac Development" cert. This is machine-specific — replace via
    # `security find-identity -v -p codesigning`. A stable identity keeps the
    # Accessibility grant sticky across rebuilds. Distribution uses Developer ID.
    "CODE_SIGN_IDENTITY[sdk=macosx*]": "SHA1_OF_YOUR_CERTIFICATE"
    SWIFT_VERSION: "6.0"

packages:
  TilingCore:
    path: Packages/TilingCore
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

targets:
  TilingGlass:
    type: application
    platform: macOS
    sources:
      - path: TilingGlass
    dependencies:
      - package: TilingCore
      - package: KeyboardShortcuts
    info:
      path: TilingGlass/Resources/Info.plist
      properties:
        # Menu-bar-only agent app: no Dock icon, no main window.
        LSUIElement: true
        CFBundleName: TilingGlass
        CFBundleDisplayName: TilingGlass
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "GPL-3.0. Copyright © 2026 Pedro Lopes."
        NSAccessibilityUsageDescription: "TilingGlass needs Accessibility access to move and resize windows into layout zones."
        LSMinimumSystemVersion: "26.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedrolopes.tilingglass
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_STRICT_CONCURRENCY: complete
