name: TilingGlass

# Machine-specific code signing lives in project.local.yml (gitignored).
# Bootstrap once per clone:  cp project.local.example.yml project.local.yml
# then optionally pin your own signing identity there — see that file and the
# README's "Code signing" section. (XcodeGen has no optional includes, so the
# local file must exist for `xcodegen generate` to run.)
include:
  - project.local.yml

options:
  bundleIdPrefix: com.pedrolopes
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  TilingCore:
    path: Packages/TilingCore
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    # Pinned exactly rather than `from:` — the resolved lockfile lives inside
    # the gitignored, regenerated .xcodeproj (XcodeGen has no mechanism to
    # commit it outside that directory), so `from:` would let every fresh
    # clone silently float to whatever the latest 2.x happens to be at build
    # time. Bump this deliberately when upgrading.
    exactVersion: 2.4.0

targets:
  TilingGlass:
    type: application
    platform: macOS
    sources:
      - path: TilingGlass
    dependencies:
      - package: TilingCore
      - package: KeyboardShortcuts
    info:
      path: TilingGlass/Resources/Info.plist
      properties:
        # Menu-bar-only agent app: no Dock icon, no main window.
        LSUIElement: true
        CFBundleName: TilingGlass
        CFBundleDisplayName: TilingGlass
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "GPL-3.0. Copyright © 2026 Pedro Lopes."
        NSAccessibilityUsageDescription: "TilingGlass needs Accessibility access to move and resize windows into layout zones."
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: "public.app-category.productivity"
        CFBundleIconName: AppIcon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pedrolopes.tilingglass
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: true
        SWIFT_STRICT_CONCURRENCY: complete
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
