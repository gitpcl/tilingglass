<!--
  TilingGlass brand mark — source of truth for the app icon.
  Regenerate the AppIcon PNGs from this file:

    cd TilingGlass/Resources/Assets.xcassets/AppIcon.appiconset
    for f in "16x16 16" "16x16@2x 32" "32x32 32" "32x32@2x 64" \
             "128x128 128" "128x128@2x 256" "256x256 256" "256x256@2x 512" \
             "512x512 512" "512x512@2x 1024"; do
      set -- $f
      cairosvg ../../../../Design/tg-mark.svg -o "icon_$1.png" --output-width "$2" --output-height "$2"
    done

  The menu-bar item draws the monochrome variant of this mark in code
  (StatusMenuController.statusItemImage); keep the two in sync by eye.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 116 116">
  <defs>
    <linearGradient id="tgPrism" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4FF0E4"/>
      <stop offset="0.5" stop-color="#5B8DEF"/>
      <stop offset="1" stop-color="#B08CFF"/>
    </linearGradient>
    <linearGradient id="tgTile" x1="0" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#1A2330"/>
      <stop offset="1" stop-color="#0C121B"/>
    </linearGradient>
    <radialGradient id="tgGlow" cx="0.28" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(8,8)">
    <rect x="3" y="3" width="94" height="94" rx="26" fill="url(#tgTile)"/>
    <rect x="3" y="3" width="94" height="94" rx="26" fill="url(#tgGlow)"/>
    <rect x="3.75" y="3.75" width="92.5" height="92.5" rx="25.25" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="1.5"/>
    <rect x="20" y="20" width="27" height="60" rx="6" fill="url(#tgPrism)"/>
    <rect x="53" y="20" width="27" height="28" rx="6" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
    <rect x="53" y="52" width="27" height="28" rx="6" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
    <path d="M20 66 L47 47" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
